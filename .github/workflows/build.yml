name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK platforms
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.0" || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypingSimulator-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release and Upload APK
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v1.0.${{ github.run_number }}"
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          NOTES="## Typing Simulator $TAG
          - تم بناء التطبيق تلقائياً عبر GitHub Actions
          - حمّل APK من الأسفل"
          
          gh release create "$TAG" \
            --title "Build $TAG" \
            --notes "$NOTES" \
            "$APK_PATH"
          
          echo "✅ Release $TAG created with APK!"
