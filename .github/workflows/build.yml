name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK platforms
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypingSimulator-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release and Upload APK
        if: success()
        run: |
          TAG="v1.0.${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Build $TAG" \
            --notes "## Typing Simulator $TAG\n- تم بناء التطبيق تلقائياً عبر GitHub Actions\n- حمّل APK من الأسفل" \
            app/build/outputs/apk/debug/app-debug.apk || \
          echo "⚠️ Release via gh failed, trying API..."
          if [ ! -f /tmp/release_done ]; then
            RELEASE=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"Build $TAG\",\"body\":\"## Typing Simulator $TAG\n- تم بناء التطبيق تلقائياً عبر GitHub Actions\n- حمّل APK من الأسفل\"}")
            echo "$RELEASE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Release!' if d.get('id') else '⚠️ Failed: '+d.get('message',''))"
          fi
